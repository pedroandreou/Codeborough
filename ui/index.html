<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Codeborough - civic concierge</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --bg:#EEF3F9; --panel:#FFFFFF; --ink:#11213A; --muted:#5A6B82; --line:#DCE5F0;
    --accent:#1E5BFF; --accent-ink:#fff; --good:#0E8F5E; --nv:#5E9400; --warn:#C24A00;
    --chip:#F3F7FD; --shadow:0 10px 30px -16px rgba(16,32,64,.30);
    --fs:1;            /* font scale multiplier */
    --radius:16px;
  }
  body.dark{ --bg:#0F1720; --panel:#16212E; --ink:#E7EEF5; --muted:#9FB2C4; --line:#24323F;
    --accent:#4f8cff; --chip:#1B2733; --shadow:0 10px 30px -16px rgba(0,0,0,.6);}
  body.hc{ --bg:#FFFFFF; --panel:#FFFFFF; --ink:#000000; --muted:#1a1a1a; --line:#000000;
    --accent:#0033CC; --chip:#FFFFFF; --shadow:none;}
  body.hc *{border-color:#000 !important}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:calc(17px*var(--fs));line-height:1.5;
    -webkit-font-smoothing:antialiased}
  .app{display:grid;grid-template-columns:minmax(420px,40%) 1fr;height:100vh}
  @media(max-width:820px){.app{grid-template-columns:1fr;grid-template-rows:1fr auto}}
  .left{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:auto}
  .right{position:relative;background:var(--bg)}
  #map{position:absolute;inset:0}
  /* header */
  .hd{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:16px 18px 10px}
  .brand h1{margin:0;font-size:calc(22px*var(--fs));letter-spacing:-.2px}
  .brand p{margin:3px 0 0;color:var(--muted);font-size:calc(13px*var(--fs))}
  .pill{display:inline-block;background:var(--chip);border:1px solid var(--line);border-radius:999px;
    padding:1px 9px;color:var(--nv);font-weight:700;font-size:calc(11px*var(--fs))}
  .a11y{display:flex;gap:6px;flex-wrap:wrap}
  .a11y button{min-width:40px;min-height:40px;border:1px solid var(--line);background:var(--chip);
    color:var(--ink);border-radius:10px;font-size:calc(14px*var(--fs));cursor:pointer;font-weight:700}
  .a11y button:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  /* where + categories */
  .sec{padding:6px 18px}
  .lbl{font-size:calc(12px*var(--fs));text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:10px 0 6px;font-weight:700}
  .place{display:flex;gap:8px}
  .place input{flex:1;min-height:52px;border:2px solid var(--line);border-radius:12px;background:var(--bg);
    color:var(--ink);padding:0 14px;font-size:calc(17px*var(--fs))}
  .cats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .cat{display:flex;align-items:center;gap:10px;min-height:60px;border:2px solid var(--line);background:var(--chip);
    color:var(--ink);border-radius:14px;padding:0 14px;font-size:calc(17px*var(--fs));font-weight:700;cursor:pointer;text-align:left}
  .cat .ico{font-size:calc(26px*var(--fs));line-height:1}
  .cat:hover{border-color:var(--accent)}
  .cat:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  /* big mic + ask */
  .ask{display:flex;gap:10px;align-items:stretch;margin-top:6px}
  .mic{flex:none;width:76px;height:76px;border-radius:50%;border:none;background:var(--accent);color:#fff;
    font-size:30px;cursor:pointer;box-shadow:var(--shadow)}
  .mic.on{background:#E0245E;animation:pulse 1.1s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(224,36,94,.5)}70%{box-shadow:0 0 0 16px rgba(224,36,94,0)}100%{box-shadow:0 0 0 0 rgba(224,36,94,0)}}
  .ask .col{flex:1;display:flex;flex-direction:column;gap:8px;justify-content:center}
  .ask input{min-height:52px;border:2px solid var(--line);border-radius:12px;background:var(--bg);color:var(--ink);
    padding:0 14px;font-size:calc(17px*var(--fs))}
  .send{min-height:46px;border:none;border-radius:12px;background:var(--good);color:#fff;font-weight:800;
    font-size:calc(16px*var(--fs));cursor:pointer}
  /* answer card */
  .answer{margin:12px 18px;border:2px solid var(--accent);border-radius:var(--radius);background:var(--panel);
    box-shadow:var(--shadow);padding:16px 18px;display:none}
  .answer.show{display:block}
  .answer .top{display:flex;align-items:center;gap:12px}
  .answer .big{font-size:calc(26px*var(--fs));font-weight:800;line-height:1.15}
  .answer .ico{font-size:calc(34px*var(--fs))}
  .answer .meta{color:var(--muted);font-size:calc(15px*var(--fs));margin-top:4px}
  .badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .badge{background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:4px 12px;font-size:calc(14px*var(--fs));font-weight:700}
  .badge.ok{color:var(--good);border-color:var(--good)}
  .answer .say{margin-top:12px;font-size:calc(16px*var(--fs))}
  .answer .acts{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .answer .acts button{min-height:50px;border-radius:12px;border:2px solid var(--accent);background:var(--accent);
    color:#fff;font-weight:800;font-size:calc(16px*var(--fs));cursor:pointer;padding:0 16px}
  .answer .acts button.ghost{background:transparent;color:var(--accent)}
  /* transcript + samples */
  details{margin:8px 18px;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
  summary{cursor:pointer;padding:10px 14px;font-weight:700;font-size:calc(14px*var(--fs))}
  #transcript{padding:0 14px 12px;max-height:180px;overflow:auto;font-size:calc(14px*var(--fs))}
  .msg{margin:6px 0}.msg .who{color:var(--muted);font-size:calc(11px*var(--fs));text-transform:uppercase}
  .msg .b{display:block;background:var(--chip);border:1px solid var(--line);border-radius:10px;padding:7px 10px;margin-top:2px;white-space:pre-wrap}
  .samples{display:flex;gap:8px;flex-wrap:wrap;padding:6px 18px 16px}
  .samples button{min-height:42px;border:1px dashed var(--line);background:transparent;color:var(--muted);
    border-radius:10px;font-size:calc(13px*var(--fs));cursor:pointer;padding:0 12px}
  .set{padding:8px 18px 18px;color:var(--muted);font-size:calc(12px*var(--fs))}
  .set input{border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--ink);padding:3px 8px;font-size:calc(12px*var(--fs))}
  /* map view toggle + list */
  .mapbtns{position:absolute;z-index:600;top:12px;right:12px;display:flex;gap:6px}
  .mapbtns button{min-height:40px;border:1px solid var(--line);background:var(--panel);color:var(--ink);
    border-radius:10px;padding:0 12px;font-weight:700;cursor:pointer;font-size:calc(14px*var(--fs));box-shadow:var(--shadow)}
  #listview{position:absolute;inset:0;background:var(--bg);overflow:auto;padding:18px;display:none}
  #listview.show{display:block}
  .lcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
  .lcard .big{font-size:calc(20px*var(--fs));font-weight:800}
  .placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);padding:30px;font-size:calc(18px*var(--fs))}
  .legend{position:absolute;z-index:600;bottom:12px;right:12px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:8px 10px;font-size:calc(12px*var(--fs));box-shadow:var(--shadow)}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
</style>
</head>
<body>
<div class="app">
  <!-- LEFT: answer-first, voice-first, accessible -->
  <section class="left" aria-label="Codeborough assistant">
    <div class="hd">
      <div class="brand">
        <h1>Codeborough</h1>
        <p>Your civic helper for London · <span class="pill">on-device · private</span></p>
      </div>
      <div class="a11y" role="group" aria-label="Accessibility controls">
        <button id="fsdown" title="Smaller text" aria-label="Smaller text">A-</button>
        <button id="fsup" title="Bigger text" aria-label="Bigger text">A+</button>
        <button id="theme" title="Light or dark" aria-label="Toggle dark mode">🌙</button>
        <button id="hc" title="High contrast" aria-label="High contrast">◐</button>
        <button id="mute" title="Voice on/off" aria-label="Toggle voice" aria-pressed="false">🔊</button>
      </div>
    </div>

    <div class="sec">
      <div class="lbl">📍 Where are you?</div>
      <div class="place">
        <input id="place" placeholder="Type a place or postcode - e.g. Brixton" autocomplete="off" aria-label="Your location" />
      </div>
    </div>

    <div class="sec">
      <div class="lbl">What do you need?</div>
      <div class="cats" role="group" aria-label="Civic services">
        <button class="cat" data-cat="polling station"><span class="ico">🗳️</span> Where I vote</button>
        <button class="cat" data-cat="public toilet"><span class="ico">🚻</span> Public toilet</button>
        <button class="cat" data-cat="reception centre"><span class="ico">🆘</span> Rest centre</button>
        <button class="cat" data-cat="library"><span class="ico">📚</span> Library</button>
        <button class="cat" data-cat="grit bin"><span class="ico">❄️</span> Grit bin</button>
        <button class="cat" data-cat="safe"><span class="ico">🛡️</span> Safe route</button>
      </div>
    </div>

    <div class="sec">
      <div class="lbl">Or just ask</div>
      <div class="ask">
        <button class="mic" id="mic" title="Tap and speak" aria-label="Tap and speak">🎙️</button>
        <div class="col">
          <input id="q" placeholder="Ask anything - or tap the mic and speak" autocomplete="off" aria-label="Ask a question" />
          <button class="send" id="send">Ask</button>
        </div>
      </div>
    </div>

    <!-- HERO: the answer, announced to screen readers -->
    <div class="answer" id="answer" role="status" aria-live="assertive"></div>

    <details>
      <summary>Conversation</summary>
      <div id="transcript"></div>
    </details>

    <div class="lbl" style="padding:0 18px">Try a sample (works offline)</div>
    <div class="samples">
      <button onclick="sample('polling')">🗳️ Vote</button>
      <button onclick="sample('toilets')">🚻 Toilet</button>
      <button onclick="sample('rest')">🆘 Rest centre</button>
      <button onclick="sample('safety')">🛡️ Safe route</button>
      <button onclick="clearAll()">Clear</button>
    </div>

    <div class="set">
      <details><summary>Settings</summary>
        <div style="margin-top:6px">bridge <input id="bridge" value="http://127.0.0.1:8091" size="22"></div>
      </details>
    </div>
  </section>

  <!-- RIGHT: map is supporting, simplified, revealed on result -->
  <section class="right" aria-label="Map">
    <div class="mapbtns">
      <button id="viewMap" aria-pressed="true">🗺️ Map</button>
      <button id="viewList" aria-pressed="false">📋 List</button>
    </div>
    <div id="map"></div>
    <div class="placeholder" id="ph">Set where you are, then tap what you need - the map fills in here.</div>
    <div id="listview" aria-live="polite"></div>
    <div class="legend" id="legend" hidden></div>
  </section>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const $=s=>document.querySelector(s);
const bridgeUrl=()=>$("#bridge").value.replace(/\/$/,"");
const COLORS={libraries:"#2b7cff",schools:"#d99800","public-toilets":"#0e9f7e","polling-stations":"#7c3aed","grit-bins":"#64748b",cctv:"#e0245e","reception-centres":"#ea580c",origin:"#0e8f5e"};
const LABEL={libraries:"Library",schools:"School","public-toilets":"Public toilet","polling-stations":"Polling station","grit-bins":"Grit bin",cctv:"Camera","reception-centres":"Rest centre"};
const ICON={"polling-stations":"🗳️","public-toilets":"🚻","reception-centres":"🆘",libraries:"📚","grit-bins":"❄️",schools:"🏫",cctv:"🎥"};

/* ---------- accessibility prefs (persisted) ---------- */
let fs=parseFloat(localStorage.cb_fs||"1");
function applyFs(){document.documentElement.style.setProperty("--fs",fs);localStorage.cb_fs=fs;}
applyFs();
$("#fsup").onclick=()=>{fs=Math.min(1.8,fs+0.1);applyFs();};
$("#fsdown").onclick=()=>{fs=Math.max(0.8,fs-0.1);applyFs();};
if(localStorage.cb_theme==="dark")document.body.classList.add("dark");
$("#theme").onclick=()=>{document.body.classList.toggle("dark");localStorage.cb_theme=document.body.classList.contains("dark")?"dark":"";};
if(localStorage.cb_hc==="1")document.body.classList.add("hc");
$("#hc").onclick=()=>{document.body.classList.toggle("hc");localStorage.cb_hc=document.body.classList.contains("hc")?"1":"";};
let muted=localStorage.cb_mute==="1";
function syncMute(){$("#mute").textContent=muted?"🔇":"🔊";$("#mute").setAttribute("aria-pressed",String(muted));}
$("#mute").onclick=()=>{muted=!muted;localStorage.cb_mute=muted?"1":"";syncMute();};syncMute();

/* ---------- map (light, decluttered) ---------- */
const map=L.map("map",{zoomControl:true}).setView([51.5074,-0.1278],11);
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
  {maxZoom:19,subdomains:"abcd",attribution:'&copy; OpenStreetMap &copy; CARTO'}).addTo(map);
let layer=L.layerGroup().addTo(map);
function clearMap(){layer.clearLayers();$("#legend").hidden=true;$("#legend").innerHTML="";}
function pin(lat,lon,c,big){return L.circleMarker([lat,lon],{radius:big?12:8,color:"#fff",weight:2,fillColor:c,fillOpacity:1});}
function walkMin(m){return Math.max(1,Math.round(m/80));}

function showOnMap(origin,results,safety){
  clearMap();$("#ph").style.display="none";
  const pts=[];const types=new Set();
  if(origin){pin(origin.lat,origin.lon,COLORS.origin,true).addTo(layer).bindPopup("<b>You are here</b>");pts.push([origin.lat,origin.lon]);}
  (results||[]).forEach((r,i)=>{if(typeof r.lat!=="number")return;types.add(r.facility);pts.push([r.lat,r.lon]);
    const d=r.distance_m!=null?`<br>${walkMin(r.distance_m)} min walk (${r.distance_m} m)`:"";
    pin(r.lat,r.lon,COLORS[r.facility]||"#888",i===0).addTo(layer).bindPopup(`<b>${ICON[r.facility]||""} ${r.name}</b>${r.address?"<br>"+r.address:""}${d}`);
  });
  if(origin&&results&&results[0])L.polyline([[origin.lat,origin.lon],[results[0].lat,results[0].lon]],{color:COLORS.origin,weight:5,opacity:.8}).addTo(layer);
  if(safety&&origin){L.circle([origin.lat,origin.lon],{radius:safety.query?.radiusM||400,color:COLORS.cctv,weight:1,fillColor:COLORS.cctv,fillOpacity:.06}).addTo(layer);
    (safety.nearest_cameras||[]).forEach(c=>pin(c.lat,c.lon,COLORS.cctv,false).addTo(layer));}
  if(pts.length)map.fitBounds(L.latLngBounds(pts).pad(0.35),{maxZoom:16});
  if(types.size){$("#legend").hidden=false;$("#legend").innerHTML=[...types].map(t=>`<div><i style="background:${COLORS[t]}"></i>${LABEL[t]||t}</div>`).join("");}
  renderList(origin,results,safety);
}
function renderList(origin,results,safety){
  let h="";
  (results||[]).forEach(r=>{h+=`<div class="lcard"><div class="big">${ICON[r.facility]||""} ${r.name}</div>
    <div style="color:var(--muted)">${LABEL[r.facility]||r.facility}${r.borough?" · "+r.borough:""}</div>
    ${r.address?`<div>${r.address}</div>`:""}${r.distance_m!=null?`<div><b>${walkMin(r.distance_m)} min walk</b> (${r.distance_m} m)</div>`:""}
    ${badgesHtml(r)}</div>`;});
  if(safety)h+=`<div class="lcard"><div class="big">🛡️ ${safety.cctv_count} cameras on busy, monitored streets nearby</div><div style="color:var(--muted)">Stick to the main, well-lit roads. (Traffic/town cameras - not crime surveillance.)</div></div>`;
  $("#listview").innerHTML=h||'<div class="placeholder">No results yet.</div>';
}

/* ---------- accessibility badges from a result's extra fields ---------- */
function badgesHtml(r){
  const b=[];const e=Object.entries(r.extra||{}).map(([k,v])=>`${k} ${v}`.toLowerCase()).join(" ");
  if(/accessib|disabled|step.?free|wheelchair/.test(e))b.push('<span class="badge ok">♿ Step-free</span>');
  if(/baby/.test(e))b.push('<span class="badge">🚼 Baby change</span>');
  const hrs=Object.entries(r.extra||{}).find(([k])=>/open|hour/i.test(k));
  if(hrs)b.push(`<span class="badge">🕐 ${hrs[1]}</span>`);
  if(r.distance_m!=null)b.push(`<span class="badge">🚶 ${walkMin(r.distance_m)} min</span>`);
  return b.length?`<div class="badges">${b.join("")}</div>`:"";
}

/* ---------- the answer card (hero) ---------- */
function showAnswer(result,prose){
  const a=$("#answer");
  if(result){
    a.innerHTML=`<div class="top"><span class="ico">${ICON[result.facility]||"📍"}</span>
      <div><div class="big">${result.name}</div>
      <div class="meta">${LABEL[result.facility]||result.facility}${result.distance_m!=null?` · ${walkMin(result.distance_m)} min walk`:""}${result.address?` · ${result.address}`:""}</div></div></div>
      ${badgesHtml(result)}
      ${prose?`<div class="say">${prose}</div>`:""}
      <div class="acts"><button id="again">🔊 Hear again</button>
        <button class="ghost" onclick="map.flyTo([${result.lat},${result.lon}],16)">🗺️ Show on map</button></div>`;
  }else{
    a.innerHTML=`<div class="say">${prose||""}</div><div class="acts"><button id="again">🔊 Hear again</button></div>`;
  }
  a.classList.add("show");
  const ag=$("#again");if(ag)ag.onclick=()=>speak(prose||(result&&result.name)||"");
}

/* ---------- bridge calls ---------- */
async function api(path,b){const r=await fetch(bridgeUrl()+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)});return r.json();}
async function speak(text){if(muted||!text)return;try{const r=await fetch(bridgeUrl()+"/tts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:text.slice(0,700)})});if(r.ok){new Audio(URL.createObjectURL(await r.blob())).play();}}catch(e){}}
function trans(who,t){const el=$("#transcript");el.innerHTML+=`<div class="msg"><span class="who">${who}</span><span class="b">${(t||"").replace(/</g,"&lt;")}</span></div>`;el.scrollTop=el.scrollHeight;}

const CATMAP={"polling station":"polling station","public toilet":"toilet","reception centre":"reception centre",library:"library","grit bin":"grit bin",safe:"safe"};

async function run(message,category){
  trans("You",message);
  let origin=null,results=[],safety=null;
  try{
    const place=$("#place").value.trim();
    const g=await api("/geocode",{query:place||message});
    if(typeof g.lat==="number"){origin=g;
      if(category==="safe"){safety=await api("/safety",{lat:g.lat,lon:g.lon,radiusM:500});}
      else{const near=await api("/nearest",{lat:g.lat,lon:g.lon,category:CATMAP[category]||category||undefined,limit:5});results=near.results||[];}
      showOnMap(origin,results,safety);
    }
  }catch(e){}
  // conversational reply from the live agent
  let reply="";
  try{const a=await api("/ask",{message,session:"codeborough-ui"});reply=a.reply||a.error||"";}
  catch(e){reply="(bridge offline - start ui/bridge.mjs on :8091)";}
  trans("Codeborough",reply);
  showAnswer(results[0]||null, reply || (results[0]?`${results[0].name}, ${walkMin(results[0].distance_m)} minutes' walk.`:""));
  speak(reply || (results[0]?`The nearest is ${results[0].name}, about ${walkMin(results[0].distance_m)} minutes' walk.`:""));
}

/* ---------- inputs ---------- */
function ask(){const m=$("#q").value.trim();if(!m)return;$("#q").value="";run(m,null);}
$("#send").onclick=ask;$("#q").addEventListener("keydown",e=>{if(e.key==="Enter")ask();});
$("#place").addEventListener("keydown",e=>{if(e.key==="Enter")$("#q").focus();});
document.querySelectorAll(".cat").forEach(b=>b.onclick=()=>{
  const cat=b.dataset.cat;const place=$("#place").value.trim();
  if(!place){$("#place").focus();$("#place").placeholder="Tell me where you are first ↑";return;}
  const phrase=cat==="safe"?`Is it a safe, well-lit route around ${place}?`:`Where is the nearest ${cat} to ${place}?`;
  run(phrase,cat);
});

/* ---------- mic ---------- */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;const micBtn=$("#mic");
if(SR){const rec=new SR();rec.lang="en-GB";rec.interimResults=false;
  micBtn.onclick=()=>{micBtn.classList.add("on");try{rec.start();}catch(e){}};
  rec.onresult=e=>{micBtn.classList.remove("on");$("#q").value=e.results[0][0].transcript;ask();};
  rec.onend=()=>micBtn.classList.remove("on");rec.onerror=()=>micBtn.classList.remove("on");
}else micBtn.onclick=()=>trans("System","Mic needs Chrome - please type. (Replies still speak aloud.)");

/* ---------- map/list toggle ---------- */
$("#viewMap").onclick=()=>{$("#listview").classList.remove("show");$("#viewMap").setAttribute("aria-pressed","true");$("#viewList").setAttribute("aria-pressed","false");map.invalidateSize();};
$("#viewList").onclick=()=>{$("#listview").classList.add("show");$("#viewMap").setAttribute("aria-pressed","false");$("#viewList").setAttribute("aria-pressed","true");};

const S={brixton:{query:"Brixton",lat:51.4626,lon:-0.1145},
