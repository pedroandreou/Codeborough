<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Codeborough — civic concierge</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{ --bg:#0f1720; --panel:#16212e; --ink:#e7eef5; --muted:#9fb2c4; --accent:#76b900; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
  #app{display:flex;height:100vh}
  #side{width:420px;min-width:360px;background:var(--panel);display:flex;flex-direction:column;border-right:1px solid #0a1118}
  #map{flex:1}
  header{padding:14px 16px;border-bottom:1px solid #0a1118}
  header h1{margin:0;font-size:18px}
  header p{margin:4px 0 0;font-size:12px;color:var(--muted)}
  .badge{display:inline-block;background:#23313f;color:var(--accent);border-radius:10px;padding:1px 8px;font-size:11px;margin-top:6px}
  #transcript{flex:1;overflow:auto;padding:12px 16px}
  .msg{margin:0 0 10px;font-size:13px;line-height:1.45}
  .msg .who{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .bubble{display:block;padding:8px 10px;border-radius:8px;margin-top:3px;white-space:pre-wrap}
  .msg.user .bubble{background:#22303f}
  .msg.bot .bubble{background:#1c2a1c;border:1px solid #2c3f2c}
  .msg.sys .bubble{background:#2a2333;border:1px solid #43365a;color:#d7c9ee;font-size:12px}
  .composer{padding:10px 12px;border-top:1px solid #0a1118;display:flex;gap:6px;align-items:center}
  .composer input{flex:1;background:#0f1720;color:var(--ink);border:1px solid #2c3c4d;border-radius:8px;padding:9px 10px;font-size:13px}
  button{cursor:pointer;border:1px solid #2c3c4d;background:#1d2937;color:var(--ink);border-radius:8px;padding:8px 10px;font-size:13px}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent);color:#0b1206;border-color:var(--accent);font-weight:700}
  button.mic.on{background:#ff6b6b;color:#1a0606;border-color:#ff6b6b}
  .scn{padding:10px 16px;border-top:1px solid #0a1118}
  .scn h2{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 8px}
  .scn button{margin:0 6px 6px 0}
  .legend{position:absolute;z-index:500;bottom:14px;right:14px;background:rgba(22,33,46,.92);padding:8px 10px;border-radius:8px;font-size:12px}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .row{display:flex;gap:6px;align-items:center;padding:0 12px 8px}
  .row input{flex:1;background:#0f1720;color:var(--muted);border:1px solid #223;border-radius:6px;padding:4px 8px;font-size:11px}
  a{color:var(--accent)}
</style>
</head>
<body>
<div id="app">
  <div id="side">
    <header>
      <h1>Codeborough</h1>
      <p>Voice-first civic concierge for London · <span style="color:var(--accent)">on-device · private</span></p>
    </header>

    <div id="transcript">
      <div class="msg sys"><span class="bubble">Ask about a civic service in London — by text or 🎙 voice. e.g. "Where's the nearest library to Triton Square?"</span></div>
    </div>

    <div class="composer">
      <button class="mic" id="mic" title="Speak">🎙</button>
      <input id="q" placeholder="Ask… (Enter to send)" autocomplete="off" />
      <button class="primary" id="send">Send</button>
    </div>
    <div class="row">
      <label style="font-size:11px;color:var(--muted)">bridge</label>
      <input id="bridge" value="http://127.0.0.1:8091" />
      <label style="font-size:11px;color:var(--muted)"><input type="checkbox" id="speak" checked> speak</label>
    </div>

    <div class="scn">
      <h2>Demo scenarios (offline samples)</h2>
      <button onclick="runFamily()">👨‍👧 Family→school</button>
      <button onclick="runToilets()">🚻 Toilets</button>
      <button onclick="runSafety()">🛡 Safe streets</button>
      <button onclick="runPolling()">🗳 Polling</button>
      <button onclick="clearMap()">✦ Clear map</button>
    </div>
  </div>
  <div id="map"></div>
</div>
<div class="legend" id="legend"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const COLORS={libraries:"#4aa3ff",schools:"#ffd24a","public-toilets":"#41d6c3","polling-stations":"#c08cff","grit-bins":"#9aa7b2",cctv:"#ff6b6b","reception-centres":"#ff9f43",origin:"#76b900"};
const LABEL={libraries:"Library",schools:"School","public-toilets":"Public toilet","polling-stations":"Polling station","grit-bins":"Grit bin",cctv:"Camera","reception-centres":"Reception centre"};
const bridgeUrl=()=>document.getElementById("bridge").value.replace(/\/$/,"");

const map=L.map("map").setView([51.5074,-0.1278],12);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap"}).addTo(map);
let layer=L.layerGroup().addTo(map);
function clearMap(){layer.clearLayers();document.getElementById("legend").innerHTML="";}
function legend(t){document.getElementById("legend").innerHTML=t.map(x=>`<div><i style="background:${COLORS[x]||'#888'}"></i>${LABEL[x]||x}</div>`).join("");}
function dot(lat,lon,c,r){return L.circleMarker([lat,lon],{radius:r||7,color:"#0a1118",weight:1,fillColor:c,fillOpacity:.95});}
function showOrigin(g,l){dot(g.lat,g.lon,COLORS.origin,9).addTo(layer).bindPopup(`<b>${l||g.query||"You are here"}</b>`);}
function showResults(res){const t=new Set(),pts=[];res.forEach(r=>{if(typeof r.lat!=="number")return;t.add(r.facility);pts.push([r.lat,r.lon]);const d=r.distance_m!=null?`<br>${r.distance_m} m`:"",a=r.address?`<br>${r.address}`:"";dot(r.lat,r.lon,COLORS[r.facility]||"#888").addTo(layer).bindPopup(`<b>${r.name}</b> <small>(${LABEL[r.facility]||r.facility})</small>${a}${d}<br><small>${r.borough||""}</small>`);});legend([...t]);return pts;}
function fit(pts){if(pts.length)map.fitBounds(L.latLngBounds(pts).pad(0.3));}
function renderNearest(o,origin){const pts=showResults(o.results||[]);if(origin){showOrigin(origin);pts.push([origin.lat,origin.lon]);if(o.results&&o.results[0])L.polyline([[origin.lat,origin.lon],[o.results[0].lat,o.results[0].lon]],{color:COLORS.origin,weight:3,dashArray:"6 6"}).addTo(layer);}fit(pts);}
function renderSafety(o,origin){const c=origin||{lat:o.query?.lat,lon:o.query?.lon};if(c.lat){L.circle([c.lat,c.lon],{radius:o.query?.radiusM||400,color:COLORS.cctv,weight:1,fillColor:COLORS.cctv,fillOpacity:.08}).addTo(layer);showOrigin(c,"Here");}const pts=showResults((o.nearest_cameras||[]).map(x=>({...x,facility:"cctv"})));if(c.lat)pts.push([c.lat,c.lon]);fit(pts);}

// ---- chat (talks to the bridge → live agent) ----
function say(who,text){const t=document.getElementById("transcript");t.innerHTML+=`<div class="msg ${who}"><span class="who">${who==="user"?"You":who==="sys"?"System":"Codeborough"}</span><span class="bubble">${text.replace(/</g,"&lt;")}</span></div>`;t.scrollTop=t.scrollHeight;}
function guessCategory(m){m=m.toLowerCase();for(const[k,v]of Object.entries({library:"library",school:"school",toilet:"toilet",loo:"toilet",poll:"polling station",vote:"polling station",grit:"grit bin",cctv:"cctv",camera:"cctv",safe:"cctv",reception:"reception centre"}))if(m.includes(k))return v;return null;}
async function api(path,b){const r=await fetch(bridgeUrl()+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)});return r.json();}

async function send(){
  const inp=document.getElementById("q"); const msg=inp.value.trim(); if(!msg)return; inp.value="";
  say("user",msg);
  // map: try to locate + show facilities for the spoken place/category
  try{
    const g=await api("/geocode",{query:msg});
    if(typeof g.lat==="number"){clearMap();const near=await api("/nearest",{lat:g.lat,lon:g.lon,category:guessCategory(msg)||undefined,limit:5});renderNearest(near,g);}
  }catch(e){}
  // agent reply (Nemotron + civic-geo tools + memory)
  say("sys","…thinking");
  let reply="(no reply)";
  try{const a=await api("/ask",{message:msg,session:"codeborough-ui"});reply=a.reply||a.error||"(no reply)";}
  catch(e){reply="bridge error: "+e.message+" — is ui/bridge.mjs running on :8091 (and tunnelled)?";}
  document.querySelectorAll(".msg.sys").forEach(n=>{if(n.textContent.includes("…thinking"))n.remove();});
  say("bot",reply);
  // speak it (ElevenLabs via bridge)
  if(document.getElementById("speak").checked){
    try{const r=await fetch(bridgeUrl()+"/tts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:reply.slice(0,800)})});if(r.ok){const a=new Audio(URL.createObjectURL(await r.blob()));a.play();}}catch(e){}
  }
}
document.getElementById("send").onclick=send;
document.getElementById("q").addEventListener("keydown",e=>{if(e.key==="Enter")send();});

// ---- mic (browser speech-to-text for input convenience) ----
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const micBtn=document.getElementById("mic");
if(SR){const rec=new SR();rec.lang="en-GB";rec.interimResults=false;
  micBtn.onclick=()=>{micBtn.classList.add("on");try{rec.start();}catch(e){}};
  rec.onresult=e=>{document.getElementById("q").value=e.results[0][0].transcript;micBtn.classList.remove("on");send();};
  rec.onend=()=>micBtn.classList.remove("on");rec.onerror=()=>micBtn.classList.remove("on");
}else{micBtn.title="Mic STT needs Chrome; you can still type.";micBtn.onclick=()=>say("sys","Mic STT not supported in this browser — type instead (replies still speak via ElevenLabs).");}

// ---- offline sample scenarios (work with no bridge) ----
const S={triton:{query:"1 Triton Square",lat:51.5247,lon:-0.1417},brixton:{query:"Brixton",lat:51.4626,lon:-0.1145},
 school:{name:"St Saviour's CofE Primary (demo)",facility:"schools",borough:"lambeth",address:"Herne Hill Rd, SE24 0AY",lat:51.4584,lon:-0.1193,distance_m:520},
 toilets:[{name:"Electric Avenue",facility:"public-toilets",borough:"lambeth",lat:51.46221,lon:-0.115,distance_m:56},{name:"Windrush Square",facility:"public-toilets",borough:"lambeth",lat:51.4632,lon:-0.1107,distance_m:430}],
 polling:{name:"Brixton Library, Brixton Oval SW2 1JQ",facility:"polling-stations",borough:"lambeth",lat:51.4611,lon:-0.1147,distance_m:118},
 cams:[{name:"Electric Ave/Electric Lane",facility:"cctv",borough:"lambeth",lat:51.462164,lon:-0.114104,distance_m:56},{name:"Atlantic Rd/Electric Lane",facility:"cctv",borough:"lambeth",lat:51.462952,lon:-0.113913,distance_m:56}]};
function runFamily(){clearMap();say("user","[demo] We moved to Brixton — which school and how do we get there?");renderNearest({results:[S.school]},S.brixton);say("bot",`[demo] ${S.school.name}, ${S.school.address} — ~10 min walk.`);}
function runToilets(){clearMap();renderNearest({results:S.toilets},S.brixton);say("bot","[demo] Nearest toilet: Electric Avenue, 56 m.");}
function runSafety(){clearMap();renderSafety({query:{lat:S.brixton.lat,lon:S.brixton.lon,radiusM:500},cctv_count:41,nearest_cameras:S.cams},S.brixton);say("bot","[demo] 41 cameras on the busy monitored roads nearby.");}
function runPolling(){clearMap();renderNearest({results:[S.polling]},S.brixton);say("bot","[demo] Polling: Brixton Library, step-free.");}
</script>
</body>
</html>
