<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 680" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="end" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#37474F"/></marker>
    <marker id="start" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#37474F"/></marker>
  </defs>

  <!-- background (keeps it readable in GitHub dark mode) -->
  <rect x="0" y="0" width="1040" height="680" fill="#FFFFFF"/>

  <!-- title -->
  <text x="520" y="32" text-anchor="middle" font-size="21" font-weight="700" fill="#102027">Codeborough — System Architecture</text>
  <text x="520" y="53" text-anchor="middle" font-size="12.5" fill="#607D8B">Voice-first civic concierge · build on OpenClaw · NVIDIA Nemotron 3 brain · ElevenLabs voice · grounded in on-device London open data</text>

  <!-- ElevenLabs cloud -->
  <rect x="206" y="74" width="470" height="96" rx="14" fill="#FFF3E0" stroke="#EF6C00" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="220" y="95" font-size="13" font-weight="700" fill="#E65100">ElevenLabs — cloud (voice)</text>
  <rect x="220" y="106" width="210" height="48" rx="8" fill="#FFE0B2" stroke="#EF6C00" stroke-width="1.5"/>
  <text x="325" y="127" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">Scribe v2 — STT</text>
  <text x="325" y="143" text-anchor="middle" font-size="10" fill="#8D4E00">speech → text (in)</text>
  <rect x="452" y="106" width="210" height="48" rx="8" fill="#FFE0B2" stroke="#EF6C00" stroke-width="1.5"/>
  <text x="557" y="127" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">Eleven v3 — TTS</text>
  <text x="557" y="143" text-anchor="middle" font-size="10" fill="#8D4E00">text → speech (out)</text>

  <!-- user -->
  <rect x="28" y="268" width="120" height="116" rx="12" fill="#ECEFF1" stroke="#455A64" stroke-width="2"/>
  <text x="88" y="300" text-anchor="middle" font-size="15" font-weight="700" fill="#263238">User</text>
  <text x="88" y="319" text-anchor="middle" font-size="11" fill="#546E7A">(Londoner)</text>
  <text x="88" y="346" text-anchor="middle" font-size="11" fill="#37474F">speaks /</text>
  <text x="88" y="362" text-anchor="middle" font-size="11" fill="#37474F">listens</text>

  <!-- on-device boundary -->
  <rect x="180" y="196" width="836" height="412" rx="16" fill="none" stroke="#2E7D32" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="198" y="217" font-size="12.5" font-weight="700" fill="#2E7D32">DGX Spark / ZGX Nano · GB10 · 128 GB unified — ON-DEVICE (private)</text>

  <!-- OpenClaw gateway -->
  <rect x="210" y="238" width="250" height="178" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="335" y="264" text-anchor="middle" font-size="14" font-weight="700" fill="#0D47A1">OpenClaw Gateway</text>
  <text x="335" y="281" text-anchor="middle" font-size="10" fill="#1565C0">:18789 · REUSE</text>
  <text x="335" y="306" text-anchor="middle" font-size="10.5" fill="#263238">Talk mode: listen → think → speak</text>
  <text x="335" y="323" text-anchor="middle" font-size="10.5" fill="#263238">turn-taking · barge-in</text>
  <text x="335" y="340" text-anchor="middle" font-size="10.5" fill="#263238">routes  STT ⇄ brain ⇄ TTS</text>
  <text x="335" y="364" text-anchor="middle" font-size="10.5" fill="#263238">one long session</text>
  <text x="335" y="381" text-anchor="middle" font-size="10.5" fill="#263238">tool dispatch → civic-geo</text>
  <text x="335" y="401" text-anchor="middle" font-size="9.5" font-style="italic" fill="#1565C0">the agent harness</text>

  <!-- Nemotron brain -->
  <rect x="496" y="238" width="250" height="178" rx="10" fill="#F1F8E9" stroke="#558B2F" stroke-width="2"/>
  <text x="621" y="264" text-anchor="middle" font-size="13.5" font-weight="700" fill="#33691E">NVIDIA Nemotron 3 — brain</text>
  <text x="621" y="281" text-anchor="middle" font-size="10" fill="#558B2F">REUSE runtime · WE config</text>
  <text x="621" y="306" text-anchor="middle" font-size="10.5" fill="#263238">Nano-30B-A3B (NVFP4)</text>
  <text x="621" y="323" text-anchor="middle" font-size="10.5" fill="#263238">via vLLM / Ollama · /v1</text>
  <text x="621" y="340" text-anchor="middle" font-size="10.5" font-weight="700" fill="#263238">function / tool-calling</text>
  <text x="621" y="364" text-anchor="middle" font-size="10" fill="#37474F">+ embed-1b · rerank-1b</text>
  <text x="621" y="380" text-anchor="middle" font-size="10" fill="#37474F">+ content-safety-4b</text>
  <text x="621" y="400" text-anchor="middle" font-size="9.5" font-style="italic" fill="#558B2F">breadth → Nemotron bounty</text>

  <!-- civic-geo plugin -->
  <rect x="782" y="238" width="212" height="178" rx="10" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="2"/>
  <text x="888" y="264" text-anchor="middle" font-size="13.5" font-weight="700" fill="#4A148C">civic-geo plugin</text>
  <text x="888" y="281" text-anchor="middle" font-size="10" fill="#6A1B9A">WE WRITE (our IP)</text>
  <text x="888" y="306" text-anchor="middle" font-size="10.5" fill="#263238">geocode()</text>
  <text x="888" y="323" text-anchor="middle" font-size="10.5" fill="#263238">find_nearest()</text>
  <text x="888" y="340" text-anchor="middle" font-size="10.5" fill="#263238">get_details()</text>
  <text x="888" y="357" text-anchor="middle" font-size="10.5" fill="#263238">safety_count()</text>
  <text x="888" y="374" text-anchor="middle" font-size="10.5" fill="#263238">list_coverage()</text>
  <text x="888" y="400" text-anchor="middle" font-size="9.5" font-style="italic" fill="#6A1B9A">OpenClaw tool plugin</text>

  <!-- session memory -->
  <rect x="210" y="432" width="250" height="92" rx="10" fill="#E0F7FA" stroke="#00838F" stroke-width="2"/>
  <text x="335" y="456" text-anchor="middle" font-size="12.5" font-weight="700" fill="#006064">Session memory</text>
  <text x="335" y="474" text-anchor="middle" font-size="10" fill="#263238">transcript .jsonl + MEMORY.md</text>
  <text x="335" y="490" text-anchor="middle" font-size="10" fill="#263238">recalls earlier turns (≥ 1 h 11 m)</text>
  <text x="335" y="510" text-anchor="middle" font-size="9.5" font-style="italic" fill="#00838F">ElevenLabs persistence bounty</text>

  <!-- datasets -->
  <rect x="782" y="432" width="212" height="92" rx="10" fill="#ECEFF1" stroke="#455A64" stroke-width="2"/>
  <text x="888" y="456" text-anchor="middle" font-size="12" font-weight="700" fill="#263238">London civic GeoJSON</text>
  <text x="888" y="473" text-anchor="middle" font-size="9" fill="#455A64">libraries · schools · toilets · polling</text>
  <text x="888" y="486" text-anchor="middle" font-size="9" fill="#455A64">CCTV · grit bins · reception centres</text>
  <text x="888" y="506" text-anchor="middle" font-size="9.5" font-style="italic" fill="#455A64">our data · on-device</text>

  <!-- optional sandbox note -->
  <rect x="496" y="432" width="250" height="92" rx="10" fill="#FAFAFA" stroke="#9E9E9E" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="621" y="456" text-anchor="middle" font-size="11.5" font-weight="700" fill="#616161">Optional: NemoClaw / OpenShell</text>
  <text x="621" y="474" text-anchor="middle" font-size="9.5" fill="#757575">sandbox · default-deny egress</text>
  <text x="621" y="488" text-anchor="middle" font-size="9.5" fill="#757575">ElevenLabs key brokered · audit</text>
  <text x="621" y="508" text-anchor="middle" font-size="9.5" font-style="italic" fill="#9E9E9E">security side-demo</text>

  <!-- flow arrows -->
  <!-- 1 user <-> cloud -->
  <line x1="146" y1="290" x2="236" y2="168" stroke="#37474F" stroke-width="2" marker-start="url(#start)" marker-end="url(#end)"/>
  <rect x="150" y="222" width="74" height="16" rx="3" fill="#FFFFFF"/>
  <text x="153" y="234" font-size="10.5" font-weight="700" fill="#37474F">1 voice in/out</text>
  <!-- 2 cloud <-> openclaw -->
  <line x1="418" y1="170" x2="360" y2="236" stroke="#37474F" stroke-width="2" marker-start="url(#start)" marker-end="url(#end)"/>
  <rect x="300" y="196" width="80" height="16" rx="3" fill="#FFFFFF"/>
  <text x="303" y="208" font-size="10.5" font-weight="700" fill="#37474F">2 text in/out</text>
  <!-- 3 openclaw <-> nemotron -->
  <line x1="460" y1="320" x2="496" y2="320" stroke="#37474F" stroke-width="2" marker-start="url(#start)" marker-end="url(#end)"/>
  <text x="478" y="312" text-anchor="middle" font-size="10.5" font-weight="700" fill="#37474F">3</text>
  <!-- 4 nemotron <-> civic-geo -->
  <line x1="746" y1="320" x2="782" y2="320" stroke="#37474F" stroke-width="2" marker-start="url(#start)" marker-end="url(#end)"/>
  <text x="764" y="312" text-anchor="middle" font-size="10.5" font-weight="700" fill="#37474F">4</text>
  <!-- 5 civic-geo <-> datasets -->
  <line x1="888" y1="416" x2="888" y2="432" stroke="#37474F" stroke-width="2" marker-start="url(#start)" marker-end="url(#end)"/>
  <rect x="898" y="418" width="60" height="15" rx="3" fill="#FFFFFF"/>
  <text x="901" y="430" font-size="10" font-weight="700" fill="#37474F">5 query</text>
  <!-- openclaw <-> memory -->
  <line x1="335" y1="416" x2="335" y2="432" stroke="#37474F" stroke-width="2" marker-start="url(#start)" marker-end="url(#end)"/>
  <rect x="345" y="418" width="74" height="15" rx="3" fill="#FFFFFF"/>
  <text x="348" y="430" font-size="10" font-weight="700" fill="#37474F">save/recall</text>

  <!-- flow caption -->
  <text x="180" y="556" font-size="10.5" fill="#546E7A">Flow:  user speaks → (1) ElevenLabs STT → (2) OpenClaw → (3) Nemotron reasons &amp; calls tools → (4) civic-geo → (5) GeoJSON →</text>
  <text x="180" y="571" font-size="10.5" fill="#546E7A">results back to Nemotron → composes grounded answer → (2) OpenClaw → ElevenLabs TTS → (1) user hears.  Memory persists across turns.</text>

  <!-- legend -->
  <g font-size="10.5" fill="#37474F">
    <rect x="40" y="636" width="13" height="13" rx="2" fill="#E3F2FD" stroke="#1565C0"/><text x="58" y="647">Reuse — OpenClaw runtime</text>
    <rect x="232" y="636" width="13" height="13" rx="2" fill="#F1F8E9" stroke="#558B2F"/><text x="250" y="647">Nemotron (NVIDIA)</text>
    <rect x="392" y="636" width="13" height="13" rx="2" fill="#F3E5F5" stroke="#6A1B9A"/><text x="410" y="647">We write — civic-geo + data</text>
    <rect x="612" y="636" width="13" height="13" rx="2" fill="#FFF3E0" stroke="#EF6C00" stroke-dasharray="3 2"/><text x="630" y="647">ElevenLabs (cloud)</text>
    <rect x="772" y="636" width="13" height="13" rx="2" fill="none" stroke="#2E7D32" stroke-dasharray="3 2"/><text x="790" y="647">On-device boundary</text>
  </g>
</svg>
